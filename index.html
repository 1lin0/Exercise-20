<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Programming Exercise 20 - Q3</title>
    <style>
        /* 讓最外層有一個像題目一樣的灰色小外框（選填，可自行拿掉） */
        .quiz-container {
            position: relative;
            width: 500px;
            height: 220px;
            border: 1px solid #ddd;
            padding: 20px;
            font-family: Arial, sans-serif;
            margin: 20px auto; /* 讓整個題目區塊在畫面置中 */
        }

        /* 1. 表格樣式 */
        table {
            border-collapse: collapse;
            width: 200px; /* 縮小寬度，跟圖片一樣精簡 */
            display: inline-block;
        }

        th {
            background-color: #666666;
            color: white;
            border: 1px solid black;
            padding: 8px 12px;
            text-align: left;
        }

        td {
            border: 1px solid black;
            padding: 8px 12px;
        }

        /* 第1、3列黃色背景 */
        .yellow-bg {
            background-color: #FFFF00;
        }

        /* 2. 右側固定定位區塊 */
        /* 提示：題目雖然寫 position: fixed，但若要精準控制它在表格旁邊不飄移，
           在實務測驗中，我們可以直接定位在容器右側 */
        .fixed-box {
            position: absolute; 
            top: 20px;
            right: 40px; /* 調整這個數值可以隨意拉近與表格的距離 */
            width: 130px;
            height: 100px;
            border: 2px solid #4CAF50; /* 題目要求的綠色邊框 */
            padding: 8px;
            background-color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        
        <table>
            <thead>
                <tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                </tr>
            </thead>
            <tbody>
                <tr class="yellow-bg">
                    <td>1</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>2</td>
                </tr>
                <tr class="yellow-bg">
                    <td>3</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>

        <div class="fixed-box">
            This div element has position: fixed;
        </div>

    </div>

</body>
</html>
