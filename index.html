<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Programming Exercise 20 - Q3</title>
    <style>
        /* 1. 頁面置中與集中配置 */
        body {
            display: flex;
            justify-content: center; /* 讓內容在畫面上水平置中 */
            align-items: flex-start;
            padding-top: 50px;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        /* 外層容器：把表格和 fixed 區塊框在同一個合理的寬度內 */
        .container {
            position: relative; /* 讓內部的 fixed 元素可以參照此範圍或保持合理間距 */
            width: 600px;       /* 限制總寬度，讓兩者集中 */
            display: flex;
            justify-content: space-between; /* 兩者分居左右，但因為總寬度鎖定，不會分太開 */
        }

        /* 2. 表格樣式 */
        table {
            border-collapse: collapse;
            width: 280px;
        }

        th {
            background-color: #666666;
            color: white;
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        td {
            border: 1px solid black;
            padding: 10px;
            background-color: white; /* 預設預防透明 */
        }

        /* 第1、3列黃色背景 */
        .yellow-bg {
            background-color: #FFFF00;
        }

        /* 3. 固定定位區塊（調整位置讓它集中在右側） */
        .fixed-box {
            position: fixed;
            /* 透過 calc 配合 left，讓它鎖定在畫面中央容器的右側，不會隨視窗放大而飄走 */
            left: calc(50% + 50px); 
            top: 50px;
            width: 160px;
            height: 110px;
            border: 2px solid #4CAF50; /* 綠色邊框 */
            padding: 10px;
            background-color: white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <table>
            <thead>
                <tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                </tr>
            </thead>
            <tbody>
                <tr class="yellow-bg">
                    <td>1</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>2</td>
                </tr>
                <tr class="yellow-bg">
                    <td>3</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>

        <div class="fixed-box">
            This div element has position: fixed;
        </div>

    </div>

</body>
</html>
